name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 版本与仓库根 `.python-version` 对齐（见 tests/test_root_package_json.py）
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 版本与仓库根 `.nvmrc` 对齐
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build SPA
        working-directory: frontend
        run: npm run build

      - name: Start preview and run Playwright
        working-directory: frontend
        shell: bash
        run: |
          set -e
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort > /tmp/vite-preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          cleanup() { kill "$(cat /tmp/preview.pid)" 2>/dev/null || true; }
          trap cleanup EXIT
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:4173/" > /dev/null; then
              echo "preview ready"
              break
            fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:4173/" > /dev/null
          npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
