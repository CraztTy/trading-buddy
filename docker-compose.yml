version: '3.8'

services:
  # FastAPI application
  app:
    build: .
    container_name: trading-buddy-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_MODE=sqlite
      - DATABASE_SQLITE_PATH=/app/data/trading_buddy.db
      - REDIS_URL=redis://redis:6379/0
      - TRADING_BUDDY_ENV=production
      - LOG_LEVEL=info
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: trading-buddy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Optional: MySQL database (uncomment to use MySQL instead of SQLite)
  # mysql:
  #   image: mysql:8.0
  #   container_name: trading-buddy-mysql
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=your_root_password
  #     - MYSQL_DATABASE=trading_buddy
  #     - MYSQL_USER=trading_buddy_user
  #     - MYSQL_PASSWORD=your_password
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   restart: unless-stopped

volumes:
  redis_data:
  # mysql_data: # Uncomment if using MySQL